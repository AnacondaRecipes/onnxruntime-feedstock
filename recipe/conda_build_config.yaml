cxx_compiler:              # [win]
  - vs2019                 # [win]
c_compiler:                # [win]
  - vs2019                 # [win]

# Upstream is using some flags that are unrecognized in clang17
c_compiler_version:        # [osx]
  - 14                     # [osx]
cxx_compiler_version:      # [osx]
  - 14                     # [osx]

suffix:
  - ""
  - "-novec"
ep_variant:
  - "cuda"                   # [linux64 or win64]
  - "cpu"
